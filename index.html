<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Soul Food Devotionals | Daily Devotionals by JFOutreach</title>
    <meta
      name="description"
      content="Read daily Soul Food devotionals from JFOutreach. Faith-filled, Bible-based devotionals to nourish your spirit every day."
    />
    <meta
      name="keywords"
      content="soul food devotionals, daily devotional, JFOutreach, Christian devotional, Bible devotional, faith, spiritual growth"
    />
    <meta name="author" content="JFOutreach" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://devotional.jfoutreach.com/" />

    <!-- Theme color (browser chrome on mobile) -->
    <meta name="theme-color" content="#7c6af5" />
    <meta
      name="theme-color"
      content="#0c0c10"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#f4f4f8"
      media="(prefers-color-scheme: light)"
    />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Soul Food Devotionals" />
    <meta
      property="og:title"
      content="Soul Food Devotionals | Daily Devotionals by JFOutreach"
    />
    <meta
      property="og:description"
      content="Read daily Soul Food devotionals from JFOutreach. Faith-filled, Bible-based devotionals to nourish your spirit every day."
    />
    <meta property="og:url" content="https://devotional.jfoutreach.com/" />
    <meta
      property="og:image"
      content="https://devotional.jfoutreach.com/logo.png"
    />
    <meta
      property="og:image:alt"
      content="Soul Food Devotionals by JFOutreach"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Soul Food Devotionals | Daily Devotionals by JFOutreach"
    />
    <meta
      name="twitter:description"
      content="Read daily Soul Food devotionals from JFOutreach. Faith-filled, Bible-based devotionals to nourish your spirit every day."
    />
    <meta
      name="twitter:image"
      content="https://devotional.jfoutreach.com/logo.png"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
